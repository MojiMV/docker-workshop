services:
  pgdatabase:
    image: postgres:18
    environment:
      POSTGRES_USER: "root"
      POSTGRES_PASSWORD: "root"
      POSTGRES_DB: "ny_taxi"
    volumes:
      - ny_taxi_postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@admin.com"
      PGADMIN_DEFAULT_PASSWORD: "root"
      # Critical: Disable CSRF protection for development in Codespaces
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_CONFIG_WTF_CSRF_CHECK_DEFAULT: "False"
      PGADMIN_CONFIG_WTF_CSRF_ENABLED: "False"
      # Cookie settings for Codespaces proxy
      PGADMIN_CONFIG_SESSION_COOKIE_SAMESITE: "'None'"
      PGADMIN_CONFIG_SESSION_COOKIE_SECURE: "True"
      PGADMIN_CONFIG_REMEMBER_COOKIE_SAMESITE: "'None'"
      PGADMIN_CONFIG_REMEMBER_COOKIE_SECURE: "True"
      PGADMIN_CONFIG_CSRF_COOKIE_SAMESITE: "'None'"
      PGADMIN_CONFIG_CSRF_COOKIE_SECURE: "True"
      # Additional helpful settings
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: "10"  # Debug logging
      PGADMIN_CONFIG_FILE_LOG_LEVEL: "10"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "8085:80"
    depends_on:
      pgdatabase:
        condition: service_healthy

volumes:
  ny_taxi_postgres_data:
  pgadmin_data: